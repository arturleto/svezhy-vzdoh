<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Как бросить курить без ломки, без зажоров и навсегда</title>
<meta name="description" content="Бросаем курить без ломки, без зажоров, без стресса и навсегда. Посмотри это видео.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(160deg,#0D3826 0%,#1A5C3E 55%,#1F6B47 100%);
  color:#fff;
}
.page{
  min-height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px 48px;
  text-align:center;
  position:relative;overflow:hidden;
}

/* breathing rings */
.br{
  position:absolute;border-radius:50%;
  border:1px solid rgba(168,230,197,.1);
  animation:breathe 4s ease-in-out infinite;
  pointer-events:none;
}
.br:nth-child(1){width:300px;height:300px;animation-delay:0s}
.br:nth-child(2){width:560px;height:560px;animation-delay:.7s}
.br:nth-child(3){width:860px;height:860px;animation-delay:1.4s}
.br:nth-child(4){width:1200px;height:1200px;animation-delay:2.1s}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.03);opacity:.12}}
@media(prefers-reduced-motion:reduce){.br{animation:none}}

.inner{
  position:relative;z-index:1;
  width:100%;max-width:960px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}

h1{
  font-size:clamp(1.6rem,4.5vw,2.8rem);
  font-weight:800;color:#fff;
  line-height:1.15;text-wrap:balance;
  letter-spacing:-.02em;
  max-width:680px;
}

.video-wrap{
  width:100%;
  border-radius:14px;overflow:hidden;
  box-shadow:0 28px 72px rgba(0,0,0,.55);
  background:#081E11;
  aspect-ratio:16/9;position:relative;
  border:1px solid rgba(168,230,197,.1);
}
.video-wrap iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border:none;
}

.btn-cta{
  display:inline-block;
  font-size:.9rem;font-weight:600;
  color:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.2);border-radius:24px;
  padding:.5rem 1.5rem;text-decoration:none;
  transition:color .3s, border-color .3s, background .3s, opacity .8s;
  letter-spacing:.02em;
  opacity:0;pointer-events:none;
}
.btn-cta.visible{opacity:1;pointer-events:auto;}
.btn-cta:hover{color:#fff;border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.08)}

@media(max-width:520px){
  .page{padding:28px 16px 36px;}
}
</style>
</head>
<body>
<div class="page">
  <div class="br"></div>
  <div class="br"></div>
  <div class="br"></div>
  <div class="br"></div>

  <div class="inner">
    <h1>Как бросить курить без ломки, без зажоров, без стресса и навсегда</h1>

    <div class="video-wrap">
      <iframe src="https://www.youtube.com/embed/KL7IzVKX-5w"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div>

    <a href="offer.html" class="btn-cta" id="cta">Узнать подробнее →</a>
  </div>
</div>

<script>
// Кнопка появляется через 55 секунд
setTimeout(function(){
  document.getElementById('cta').classList.add('visible');
}, 55000);
</script>
</body>
</html>
